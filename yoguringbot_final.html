<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YoguringBot 🦅</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px;
  }
  .chat-container {
    width: 100%;
    max-width: 420px;
    height: 90vh;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .header {
    background: linear-gradient(135deg, #1877F2, #00c6ff);
    padding: 15px;
    text-align: center;
    color: white;
  }
  .header h2 { font-size: 18px; font-weight: 700; }
  .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
  .online { display: inline-block; width: 8px; height: 8px; background: #4CAF50; border-radius: 50%; margin-right: 5px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 13px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .msg.bot {
    background: rgba(255,255,255,0.1);
    color: white;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
  }
  .msg.user {
    background: linear-gradient(135deg, #1877F2, #00c6ff);
    color: white;
    border-bottom-right-radius: 4px;
    align-self: flex-end;
  }
  .typing {
    display: none;
    align-self: flex-start;
    background: rgba(255,255,255,0.1);
    padding: 10px 14px;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
  }
  .typing span {
    display: inline-block;
    width: 6px; height: 6px;
    background: white;
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce 1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .config-panel {
    background: rgba(255,255,255,0.08);
    padding: 12px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .config-panel input {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 25px;
    padding: 8px 12px;
    color: white;
    font-size: 11px;
    font-family: 'Poppins', sans-serif;
    outline: none;
  }
  .config-panel input::placeholder { color: rgba(255,255,255,0.4); }
  .config-panel button {
    background: #4CAF50;
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    color: white;
    font-size: 11px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    cursor: pointer;
  }
  .input-area {
    padding: 12px;
    background: rgba(255,255,255,0.05);
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    gap: 8px;
  }
  .input-area input {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 25px;
    padding: 10px 15px;
    color: white;
    font-size: 13px;
    font-family: 'Poppins', sans-serif;
    outline: none;
  }
  .input-area input::placeholder { color: rgba(255,255,255,0.4); }
  .input-area button {
    background: linear-gradient(135deg, #1877F2, #00c6ff);
    border: none;
    border-radius: 50%;
    width: 42px; height: 42px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }
  .input-area button:hover { transform: scale(1.1); }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="header">
    <h2>🦅 YoguringBot</h2>
    <p><span class="online"></span>Lácteos Yoguring Águila • En línea</p>
  </div>

  <div class="config-panel" id="configPanel">
    <input type="password" id="apiKey" placeholder="🔑 Pega tu API Key de Groq aquí"/>
    <button onclick="saveKey()">✅ Activar</button>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">🔑 Pega tu API Key de Groq arriba y toca <strong>Activar</strong> para encender el bot 😊</div>
  </div>

  <div class="typing" id="typing">
    <span></span><span></span><span></span>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Escribe tu mensaje..." onkeypress="handleKey(event)"/>
    <button onclick="sendMessage()" id="sendBtn">➤</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `Eres YoguringBot, asistente de Lácteos Yoguring Águila. Habla en español, amable y natural. Responde con mensajes cortos máximo 3 líneas. Espera respuesta antes de continuar.

PRODUCTOS:
- Boli Yogurt 10cm x47und = $7.000 paquete, venta $200 c/u
- Boli Yogurt 12cm x50und = $10.000 paquete, venta $300 c/u
- Boli Yogurt 15cm x33und = $8.000 paquete, venta $400 c/u
- Boli Yogurt 19cm x35und = $11.000 paquete, venta $500-600 c/u
- Boli Gelatina 15cm x35und = $8.000 paquete, venta $300-400 c/u
- Shupping Bonaice 19cm x35und = $8.000 paquete, venta $300-400 c/u
- KIT PRUEBA $20.000 = 69 unidades variadas de todos los productos

DOMICILIOS siempre cobrar:
- Barrios aledaños: 4+ paquetes GRATIS, menos de 4 = $4.000
- Malambo Las Flores Juan Mina Galapa: mín 4 paquetes = $5.000
- Puerto Colombia: mín 5 paquetes = $10.000

Si no sabe qué comprar ofrece Kit Prueba $20.000.
Si compra menos de 4 sugiere agregar más para domicilio GRATIS.
Al pedir pregunta uno por uno: nombre, barrio, dirección, referencia, teléfono.
Al confirmar genera resumen completo para Jorge +57 301 2714668.`;

let history = [];
let API_KEY = '';

function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key.startsWith('gsk_') || key.length < 40) {
    alert('⚠️ Clave incorrecta. Debe empezar con gsk_ y tener más de 40 caracteres.');
    return;
  }
  API_KEY = key;
  document.getElementById('configPanel').style.display = 'none';
  document.getElementById('messages').innerHTML = '';
  addMessage('✅ ¡Bot activado! Soy YoguringBot 🦅🧊 ¿En qué te puedo ayudar?', 'bot');
}

async function sendMessage() {
  if (!API_KEY) {
    addMessage('⚠️ Primero activa el bot con tu API Key de Groq 🔑', 'bot');
    return;
  }
  const input = document.getElementById('userInput');
  const msg = input.value.trim();
  if (!msg) return;

  addMessage(msg, 'user');
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  showTyping(true);
  history.push({ role: 'user', content: msg });

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 300,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...history
        ]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.choices[0].message.content;
    history.push({ role: 'assistant', content: reply });
    showTyping(false);
    addMessage(reply, 'bot');
  } catch (err) {
    showTyping(false);
    addMessage('❌ Error: ' + err.message, 'bot');
  }

  document.getElementById('sendBtn').disabled = false;
}

function addMessage(text, type) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping(show) {
  document.getElementById('typing').style.display = show ? 'block' : 'none';
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function handleKey(e) {
  if (e.key === 'Enter') sendMessage();
}
</script>
</body>
</html>
